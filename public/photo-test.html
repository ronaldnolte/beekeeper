<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>Photo shrink test</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 16px; line-height: 1.5; max-width: 720px; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  p.sub { margin: 0 0 16px; opacity: 0.7; font-size: 14px; }
  .pick { display: inline-flex; align-items: center; gap: 8px; padding: 14px 18px; font-size: 16px; border: 1px solid currentColor; border-radius: 10px; cursor: pointer; }
  input[type=file] { display: none; }
  .controls { margin: 18px 0; padding: 14px; border: 1px solid rgba(128,128,128,0.35); border-radius: 10px; }
  .row { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
  .row label { flex: 0 0 130px; font-size: 14px; }
  .row input[type=range] { flex: 1; }
  .row .val { flex: 0 0 96px; text-align: right; font-variant-numeric: tabular-nums; font-size: 14px; font-weight: 600; }
  select { padding: 6px 8px; font-size: 15px; border-radius: 8px; }
  .stats { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0; }
  .stat { flex: 1 1 150px; padding: 10px 12px; border: 1px solid rgba(128,128,128,0.3); border-radius: 10px; }
  .stat .k { font-size: 12px; opacity: 0.65; }
  .stat .v { font-size: 18px; font-weight: 600; }
  .save { font-size: 22px; }
  .imgwrap { margin-top: 8px; }
  .imgwrap img { width: 100%; height: auto; border-radius: 10px; display: block; }
  .hint { font-size: 13px; opacity: 0.7; margin: 6px 0 0; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 0; }
  .presets button { padding: 8px 12px; font-size: 13px; border: 1px solid rgba(128,128,128,0.4); border-radius: 8px; background: transparent; color: inherit; cursor: pointer; }
</style>
</head>
<body>
  <h1>Photo shrink test</h1>
  <p class="sub">Take or choose a hive photo, then slide the settings and watch the file size. Pinch-zoom the picture to check fine detail (eggs, mites) survives.</p>

  <label class="pick">📷 Take or choose a photo
    <input id="file" type="file" accept="image/*" />
  </label>

  <div id="panel" style="display:none">
    <div class="controls">
      <div class="row">
        <label for="dim">Longest side</label>
        <input id="dim" type="range" min="640" max="2560" step="160" value="1600" />
        <span class="val" id="dimv">1600 px</span>
      </div>
      <div class="row">
        <label for="q">Detail kept</label>
        <input id="q" type="range" min="30" max="95" step="5" value="70" />
        <span class="val" id="qv">70%</span>
      </div>
      <div class="row">
        <label for="fmt">Format</label>
        <select id="fmt">
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP (smaller)</option>
        </select>
      </div>
      <div class="presets">
        <button data-d="1280" data-q="65">Small 1280 / 65%</button>
        <button data-d="1600" data-q="70">Medium 1600 / 70%</button>
        <button data-d="2048" data-q="80">Large 2048 / 80%</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">Original</div><div class="v" id="orig">–</div></div>
      <div class="stat"><div class="k">Shrunk to</div><div class="v" id="newsize">–</div></div>
      <div class="stat"><div class="k">Saving</div><div class="v save" id="saving">–</div></div>
    </div>

    <div class="imgwrap"><img id="out" alt="compressed preview" /></div>
    <p class="hint" id="dimnote"></p>
  </div>

  <script>
    var fileInput = document.getElementById('file');
    var panel = document.getElementById('panel');
    var dim = document.getElementById('dim'), q = document.getElementById('q'), fmt = document.getElementById('fmt');
    var dimv = document.getElementById('dimv'), qv = document.getElementById('qv');
    var origEl = document.getElementById('orig'), newEl = document.getElementById('newsize'), saveEl = document.getElementById('saving');
    var out = document.getElementById('out'), dimnote = document.getElementById('dimnote');
    var img = new Image(), origBytes = 0, ready = false, lastUrl = null, t = null;

    function fmtBytes(b){ return b >= 1048576 ? (b/1048576).toFixed(2)+' MB' : Math.round(b/1024)+' KB'; }

    fileInput.addEventListener('change', function(e){
      var f = e.target.files[0]; if(!f) return;
      origBytes = f.size;
      var url = URL.createObjectURL(f);
      img.onload = function(){
        ready = true; panel.style.display = 'block';
        origEl.textContent = img.naturalWidth + '×' + img.naturalHeight + '  ·  ' + fmtBytes(origBytes);
        render();
      };
      img.onerror = function(){ origEl.textContent = 'Could not read that photo — try another.'; panel.style.display='block'; };
      img.src = url;
    });

    function render(){
      if(!ready) return;
      dimv.textContent = dim.value + ' px';
      qv.textContent = q.value + '%';
      var maxSide = +dim.value;
      var scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
      var w = Math.round(img.naturalWidth * scale), h = Math.round(img.naturalHeight * scale);
      var c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(function(blob){
        if(!blob){ newEl.textContent = 'format not supported on this phone'; return; }
        if(lastUrl) URL.revokeObjectURL(lastUrl);
        lastUrl = URL.createObjectURL(blob);
        out.src = lastUrl;
        newEl.textContent = w + '×' + h + '  ·  ' + fmtBytes(blob.size);
        var pct = origBytes ? Math.round((1 - blob.size/origBytes) * 100) : 0;
        saveEl.textContent = pct + '% smaller';
        dimnote.textContent = 'From ' + fmtBytes(origBytes) + ' down to ' + fmtBytes(blob.size) + '. Pinch-zoom above to inspect detail.';
      }, fmt.value, +q.value / 100);
    }

    function debounced(){ clearTimeout(t); t = setTimeout(render, 120); }
    [dim, q].forEach(function(el){ el.addEventListener('input', debounced); });
    fmt.addEventListener('change', render);
    document.querySelectorAll('.presets button').forEach(function(b){
      b.addEventListener('click', function(){ dim.value = b.dataset.d; q.value = b.dataset.q; render(); });
    });
  </script>
</body>
</html>
